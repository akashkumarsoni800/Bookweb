<!DOCTYPE html>
<html lang="en">

<head>
    <title>
        Sign-Up form with HTML and CSS
    </title>
    <link rel="stylesheet" href="../CSS/login.css">
    <link rel="stylesheet" href="../CSS/navbar.css" />
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.0/css/all.min.css"
        integrity="sha512-DxV+EoADOkOygM4IR9yXP8Sb2qwgidEmeqAEmDKIOfPRQZOWbXCzLC6vjbZyy0vPisbH2SyW27+ddLVCN+OMzQ=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

</head>

<body>
    <div class="navbar">
        <div class="nav-left">
            <label class="checkbtn" id="menu-toggle">
                <i class="fas fa-bars"></i>
            </label>
            <label class="logo">BOOK WEB</label>
        </div>

        <ul id="menu-list">
            <li><a href="../index.html">Home</a></li>
            <li><a href="./help.html">Help</a></li>
            <li><a href="./My book.html">My Books</a></li>
            <li><a href="./about us.html">About Us</a></li>
            <li><a href="./contact us.html">Contact Us</a></li>
        </ul>

        <div class="search-container">
            <select class="search-category" id="searchCategory">
                <option value="all">All</option>
                <option value="class 9">Class 9</option>
                <option value="class 10">Class 10</option>
                <option value="class 11">Class 11</option>
                <option value="class 12">Class 12</option>
                <option value="diploma">Diploma</option>
            </select>
            <input type="text" class="search-input" id="searchInput" placeholder="Search books...">
            <button class="search-btn" id="searchBtn"><i class="fa-solid fa-magnifying-glass"></i></button>
            <div id="search-suggestions"></div>
        </div>

        <div class="navbar-right">
            <div class="profile-container" id="profileArea">
                <i class="fa-solid fa-circle-user"></i>
            </div>
            <!-- Profile Popup -->
            <div class="profile-popup" id="profilePopup">
                <div class="popup-header">
                    <h4 id="popupName">Guest User</h4>
                    <p id="popupEmail"></p>
                </div>
                <div class="popup-links">
                    <a href="javascript:void(0)" onclick="editProfile()"><i class="fa-solid fa-user-pen"></i> Edit Profile</a>
                    <a href="javascript:void(0)" class="exit-btn" onclick="logoutUser()"><i class="fa-solid fa-right-from-bracket"></i> Exit</a>
                </div>
            </div>
        </div>
    </div>





    <div class="container">
        <form id="loginForm" class="login-box">
            <h2>Login Here</h2>
            <input type="text" id="mobileno" placeholder="Username" required />
            <input type="Password" id="password" placeholder="Password" required />

      <!--  <button type="button">Login</button>-->
           <button type="submit" id="button">Login</button>
            <p style="margin-top: 15px;"><a href="forgot-password.html" style="color: #6363f1; font-size: 14px; text-decoration: none;">Forgot Password?</a></p>
            <p id="result"></p>

        </form>
    </div>
    
    <script src="../JAVASCRIPT/navbar.js"></script>
    <script>
         // 👇 Apna backend URL (Render ka)
    const backendURL = "https://bookweb-backend-vu2o.onrender.com";

    document.getElementById("loginForm").addEventListener("submit", async function (e) {
      e.preventDefault();

      const mobile = document.getElementById("mobileno").value;
      const password = document.getElementById("password").value;

      try {
        const response = await fetch(backendURL + "/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ mobileno: mobile, password })
        });

        let data = {};
        try {
          data = await response.json();
        } catch (err) {
          data = {};
        }
          console.log("🔹 Backend response:", data);

        const message = data.message || (response.ok ? "✅ Login successful" : "❌ Invalid login");

        if (!response.ok) {
          document.getElementById("result").innerText = "❌ " + message;
          return;
        }
           if (data.name) {
      localStorage.setItem("userName", data.name);
    }
          if (data.name) {
  // pura user object save karo
  localStorage.setItem("user", JSON.stringify(data));
}


        document.getElementById("result").innerText = "✅ " + message;

        // ✅ Login success hone ke baad home page par redirect
        setTimeout(() => {
          window.location.href = "../index.html";
        }, 1500);

      } catch (err) {
        document.getElementById("result").innerText = "❌ Network/Error: " + err.message;
      }
    });
    </script>

</body>

</html>
