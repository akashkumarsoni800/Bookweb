<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - BOOK WEB</title>
    <link rel="stylesheet" href="../CSS/navbar.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.0/css/all.min.css" />
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #fdfdfd; margin: 0; }
        .reset-container { max-width: 400px; margin: 100px auto; background: white; padding: 40px; border-radius: 10px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); text-align: center; }
        .reset-container h2 { color: rgb(114, 60, 60); margin-bottom: 20px; }
        .reset-container p { color: #666; font-size: 14px; margin-bottom: 25px; }
        .input-group { margin-bottom: 20px; text-align: left; }
        .input-group label { display: block; margin-bottom: 8px; font-weight: bold; }
        .input-group input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        .action-btn { width: 100%; background: rgb(114, 60, 60); color: white; padding: 12px; border: none; border-radius: 6px; font-size: 16px; cursor: pointer; transition: 0.3s; }
        .action-btn:hover { background: #5a2d2d; }
    </style>
</head>
<body>
    <div class="navbar">
        <label class="logo" style="margin: 0 auto;">BOOK WEB</label>
    </div>

    <div class="reset-container">
        <h2>Set New Password</h2>
        <p>Enter your new password below for <span id="displayMobile" style="font-weight:bold;"></span></p>
        <div class="input-group">
            <label>New Password</label>
            <input type="password" id="newPass" placeholder="••••••••">
        </div>
        <div class="input-group">
            <label>Confirm Password</label>
            <input type="password" id="confirmPass" placeholder="••••••••">
        </div>
        <button class="action-btn" onclick="submitReset()">Update Password</button>
    </div>

    <script>
        const mobile = localStorage.getItem("tempResetMobile");
        if (!mobile) window.location.href = "forgot-password.html";
        document.getElementById("displayMobile").innerText = mobile;

        async function submitReset() {
            const pass = document.getElementById("newPass").value;
            const confirm = document.getElementById("confirmPass").value;

            if (pass.length < 4) { alert("Password too short!"); return; }
            if (pass !== confirm) { alert("Passwords do not match!"); return; }

            // Simulation: In a real app, this would call a PATCH/POST /reset-password endpoint
            // We will simulate it by alerting and going to login
            alert("✅ Password updated successfully for " + mobile);
            localStorage.removeItem("tempResetMobile");
            window.location.href = "login.html";
        }
    </script>
</body>
</html>
