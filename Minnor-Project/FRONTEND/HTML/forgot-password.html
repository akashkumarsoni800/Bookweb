<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - BOOK WEB</title>
    <link rel="stylesheet" href="../CSS/navbar.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.0/css/all.min.css" />
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #fdfdfd; margin: 0; }
        .reset-container { max-width: 400px; margin: 100px auto; background: white; padding: 40px; border-radius: 10px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); text-align: center; }
        .reset-container h2 { color: rgb(114, 60, 60); margin-bottom: 20px; }
        .reset-container p { color: #666; font-size: 14px; margin-bottom: 25px; }
        .input-group { margin-bottom: 20px; text-align: left; }
        .input-group label { display: block; margin-bottom: 8px; font-weight: bold; }
        .input-group input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        .action-btn { width: 100%; background: rgb(114, 60, 60); color: white; padding: 12px; border: none; border-radius: 6px; font-size: 16px; cursor: pointer; transition: 0.3s; }
        .action-btn:hover { background: #5a2d2d; }
        .back-link { margin-top: 20px; display: block; text-decoration: none; color: #444; font-size: 14px; }
    </style>
</head>
<body>
    <div class="navbar">
        <label class="logo" style="margin: 0 auto;">BOOK WEB</label>
    </div>

    <div class="reset-container">
        <h2>Forgot Password?</h2>
        <p>Enter your registered mobile number to reset your password.</p>
        <div class="input-group">
            <label>Mobile Number</label>
            <input type="text" id="resetMobile" placeholder="e.g. 9876543210">
        </div>
        <button class="action-btn" onclick="goToReset()">Verify Mobile</button>
        <a href="login.html" class="back-link">← Back to Login</a>
    </div>

    <script>
        function goToReset() {
            const mobile = document.getElementById("resetMobile").value;
            if (mobile.length < 10) {
                alert("Please enter a valid mobile number");
                return;
            }
            // For simulation, we just store it and go to the next step
            localStorage.setItem("tempResetMobile", mobile);
            window.location.href = "reset-password.html";
        }
    </script>
</body>
</html>
